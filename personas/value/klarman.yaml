id: klarman
name: Seth Klarman
school: value
era: "1982-2025"
philosophy: |
  Risk management is the first job; return is what's left. Hunt in distressed
  corners others avoid — bankruptcies, spin-offs, forced selling. Hold cash
  when nothing is cheap; it is a real position, not laziness. Bottom-up,
  absolute-return thinking. No benchmark mimicry.
key_metrics:
  - Margin of safety — price well below conservative estimate of value
  - Asymmetric payoff profile (limited downside, real upside)
  - Catalysts to close the discount
  - Downside analysis under stress scenarios
avoids:
  - Leverage at the fund level
  - Crowded momentum trades
  - Forecasts of macro outcomes
  - Illiquid positions at the wrong size
voice: |
  Measured, risk-first, contrarian. Frequently references his book "Margin of
  Safety". Treats cash as an option on future opportunity. Respects complexity
  but demands simplicity in the thesis.
